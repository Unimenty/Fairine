<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Fairine Enterprise</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #ffffff;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 600px; padding: 2rem; }
    h1 { font-size: 8rem; margin: 0; font-weight: 900; color: #f1f5f9; position: relative; }
    .content { position: relative; margin-top: -4rem; }
    h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    p { color: #64748b; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: #0f172a;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .accent { color: #f97316; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="content">
      <h2>Lost in the <span class="accent">Suds?</span></h2>
      <p>The page you're looking for seems to have washed away. Don't worry, we can help you find your way back to the main aisle.</p>
      <a href="/" class="btn">Back to Home</a>
    </div>
  </div>
</body>
</html>
